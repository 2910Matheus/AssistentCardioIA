<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardioIA - Assistente Cardiológico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .chat-container { max-width: 600px; margin: 50px auto; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 80vh; }
        .chat-header { background-color: #d32f2f; color: white; padding: 20px; border-top-left-radius: 15px; border-top-right-radius: 15px; font-weight: bold; font-size: 1.2rem; }
        .chat-messages { flex-grow: 1; overflow-y: auto; padding: 20px; border-bottom: 1px solid #eee; }
        .message { margin-bottom: 15px; max-width: 80%; padding: 10px 15px; border-radius: 15px; position: relative; }
        .user-message { background-color: #e3f2fd; align-self: flex-end; margin-left: auto; border-bottom-right-radius: 2px; }
        .bot-message { background-color: #f1f1f1; align-self: flex-start; border-bottom-left-radius: 2px; }
        .chat-input { padding: 20px; display: flex; gap: 10px; }
        #user-input { flex-grow: 1; border-radius: 25px; border: 1px solid #ddd; padding: 10px 20px; outline: none; }
        #send-btn { border-radius: 25px; background-color: #d32f2f; border: none; padding: 10px 25px; }
        .typing-indicator { font-size: 0.8rem; color: #888; margin-top: 5px; font-style: italic; display: none; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        CardioIA - Assistente Cardiológico Inteligente
    </div>
    <div class="chat-messages" id="chat-messages">
        <div class="message bot-message">
            Olá! Eu sou o assistente do CardioIA. Como posso ajudar com sua saúde cardíaca hoje?
        </div>
    </div>
    <div class="typing-indicator" id="typing-indicator">O assistente está digitando...</div>
    <div class="chat-input">
        <input type="text" id="user-input" placeholder="Digite sua mensagem..." autocomplete="off">
        <button class="btn btn-primary" id="send-btn">Enviar</button>
    </div>
</div>

<script>
    const chatMessages = document.getElementById('chat-messages');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const typingIndicator = document.getElementById('typing-indicator');

    function appendMessage(text, isUser) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
        messageDiv.innerText = text;
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, true);
        userInput.value = '';
        typingIndicator.style.display = 'block';

        try {
            const response = await fetch('/message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await response.json();
            appendMessage(data.response, false);
        } catch (error) {
            appendMessage("Erro ao conectar com o servidor.", false);
        } finally {
            typingIndicator.style.display = 'none';
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
